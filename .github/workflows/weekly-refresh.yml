name: weekly-refresh

on:
  schedule:
    # Saturday 22:00 UTC — weekly canonical refresh
    - cron: '0 22 * * 6'
  workflow_dispatch:

permissions:
  contents: write       # to commit refreshed parquet back

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh live-API sources + rebuild parquet
        run: python scripts/refresh.py --out-dir data

      - name: Commit if changed
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          if ! git diff --quiet data/; then
            git add data/prices.parquet data/prices.csv data/use.parquet data/use.csv data/refresh_log.csv
            git commit -m "chore: weekly fertilizer refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to publish"
          fi

      - name: Notify Databricks (optional — triggers load job)
        if: ${{ secrets.DATABRICKS_HOST != '' && vars.DATABRICKS_REFRESH_JOB_ID != '' }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"job_id": ${{ vars.DATABRICKS_REFRESH_JOB_ID }}}' \
            ${{ secrets.DATABRICKS_HOST }}/api/2.1/jobs/run-now
